<style>
@font-face {
    font-family: "font";
    src: url("/assets/fonts/inter_reg.ttf") format("truetype"),
}
@font-face {
    font-family: "font_bold";
    src: url("/assets/fonts/inter_bold.ttf") format("truetype"),
}
.font {
    font-family: "font";
}
.heavy {
    font-family: "font_bold";
}
#icon {
    position: absolute;
    top: 16%;
    left: 54%;
}
</style>
<meta http-equiv="refresh" content="600">
<body>
    <h2 style="margin-top: 12.5px; text-align: right;" class="font" id="city">Loading...</h2>
    <h1 style="margin-top: -5px; font-size: 30px; margin-left: 50px;" class="heavy">now</h1>
    <h1 style="margin-top: -10px; margin-right: 105px; text-align: right; font-size: 45px;" class="font" id="temp">99</h1>
    <h1 style="margin-top: -20px; margin-left: 55px; font-size: 20px; white-space: nowrap;" class="font" id="text_main">please wait</h1>
    <img id="icon" src="/assets/icon/36.webp" width="47%" height="auto">
</body>

<script>
const urlParams = new URLSearchParams(window.location.search);
const urlZip = urlParams.get('zip');

fetch("/data.php?loc=" + urlZip)
.then(response => response.json())
.then(data => {
  document.getElementById("city").textContent = data.current.info.cityName;

  let phrase = data.current.info.phraseLong.toLowerCase();
  if (phrase === "showers in the vicinity") {
    phrase = "showers in vicinity";
  }

  const texts = [
    phrase,
    "wind " + data.current.conditions.windCardinal + " " + data.current.conditions.windSpeed,
    "gusts " + (data.current.conditions.windGusts !== null ? data.current.conditions.windGusts : 0) + " mph",
    "humidity " + data.current.conditions.humidity + "%",
    "dew point " + data.current.conditions.dewPoint + "°",
    "pressure " + data.current.conditions.pressure + " " + data.current.conditions.pressureTendencyPhrase[0],
    data.current.conditions.visibility ? "visibility " + data.current.conditions.visibility + " miles" : "visibility unlimited",
    data.current.conditions.cloudCeiling ? "ceiling " + data.current.conditions.cloudCeiling + " ft" : "ceiling unlimited",
    "UV index " + data.extended.daypart[0].uvPhrase
  ];

  document.getElementById("icon").src = "/assets/icon/" + data.current.info.iconCode + ".webp";
  document.getElementById("temp").textContent = data.current.conditions.temperature;

  let index = 0;
  const textElement = document.getElementById("text_main");

  // Initial text
  textElement.textContent = texts[index];

  // Cycle every 10 seconds
  setInterval(() => {
    index = (index + 1) % texts.length;
    textElement.textContent = texts[index];
  }, 10000); // 10000 ms = 10 seconds
})
.catch(err => console.error(err));
</script>
